name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.7"
          enable-cache: true

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-extra \
            texlive-xetex \
            texlive-bibtex-extra \
            biber \
            texlive-lang-greek \
            latexmk \
            lmodern \
            texlive-fonts-extra

      - name: Check LaTeX compiles
        run: |
          cd tex
          xelatex -interaction=nonstopmode -shell-escape main.tex

      - name: Sync environment (project + deps)
        run: uv sync --locked

      - name: Validate notebooks (pytest + nbval)
        run: uv run pytest -vv --nbval --current-env .
